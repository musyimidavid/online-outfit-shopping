<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clothes - Outfit Store</title>
<style>
    body {
        margin: 0;
        min-height: 100vh;
        color: #fff;
        font-family: Arial, sans-serif;
        background-image: url('https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1600&auto=format&fit=crop&q=80');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-color: rgba(0, 0, 0, 0.75);
        background-blend-mode: multiply;
    }
    nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: rgba(26, 26, 26, 0.95);
        padding: 10px 20px;
        box-shadow: 0 0 10px #0ff;
    }
    .dropdown { position: relative; display: inline-block; }
    .dropbtn {
        background-color: #0ff;
        color: #000;
        padding: 10px;
        font-size: 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }
    .dropdown-content {
        display: none;
        position: absolute;
        background-color: #222;
        min-width: 160px;
        z-index: 1;
        border-radius: 4px;
        box-shadow: 0 0 10px #0ff;
    }
    .dropdown-content a {
        color: #fff;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
    }
    .dropdown-content a:hover { background-color: #0ff; color: #000; }
    .dropdown:hover .dropdown-content { display: block; }
    .user-info {
        color: #0ff;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .logout-btn {
        background: transparent;
        border: 1px solid #f0f;
        color: #f0f;
        padding: 5px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        font-weight: bold;
    }
    .logout-btn:hover { background: #f0f; color: #000; }
    .items {
        display: flex;
        flex-wrap: wrap;
        padding: 20px;
        gap: 20px;
        justify-content: center;
    }
    .item {
        background-color: rgba(26, 26, 26, 0.92);
        border: 2px solid #0ff;
        border-radius: 8px;
        padding: 15px;
        width: calc(33% - 40px);
        min-width: 250px;
        box-shadow: 0 0 10px #0ff;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: transform 0.3s ease;
    }
    .item:hover { transform: translateY(-5px); box-shadow: 0 0 20px #0ff; }
    .item img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 4px;
        margin-bottom: 10px;
    }
    .item h3 { margin: 10px 0; color: #0ff; }
    .item p  { margin: 5px 0; font-size: 1.2em; font-weight: bold; }
    .item button {
        background-color: #0ff;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        margin-top: auto;
        transition: all 0.3s ease;
    }
    .item button:hover { background-color: #0cc; transform: scale(1.05); box-shadow: 0 0 10px #0ff; }
    h2 { text-align: center; margin-top: 20px; color: #0ff; text-shadow: 0 0 10px #0ff; font-size: 2em; }
    footer {
        background-color: rgba(26, 26, 26, 0.95);
        padding: 10px 20px;
        text-align: center;
        box-shadow: 0 0 10px #0ff;
        margin-top: 40px;
    }
    .toast {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: #0ff;
        color: #000;
        padding: 14px 22px;
        border-radius: 8px;
        font-weight: bold;
        box-shadow: 0 0 20px #0ff;
        display: none;
        z-index: 999;
        animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
</style>
</head>
<body>

<nav>
    <div class="dropdown">
        <button class="dropbtn">Menu</button>
        <div class="dropdown-content">
            <a href="homepage.html">Homepage</a>
            <a href="shoes.html">Shoes</a>
            <a href="clothes.html">Clothes</a>
            <a href="cart.html">My Order</a>
        </div>
    </div>
    <div class="user-info">
        <span id="welcomeMsg"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</nav>

<h2>✨ Clothing Collection ✨</h2>

<div class="items">

    <div class="item">
        <!-- Baggy jeans — Unsplash free image -->
        <img src="https://images.unsplash.com/photo-1555689502-c4b22d76c56f?w=400&auto=format&fit=crop&q=80" alt="Baggy Jeans" loading="lazy">
        <h3>Baggy Jeans</h3>
        <p>ksh 1500</p>
        <button onclick="addToCart('Baggy Jeans', 1500)">Add to Cart</button>
    </div>

    <div class="item">
        <!-- Maxi skirt — Unsplash free image -->
        <img src="https://images.unsplash.com/photo-1601924994987-69e26d50dc26?w=400&auto=format&fit=crop&q=80" alt="Women Maxi Skirts" loading="lazy">
        <h3>Women Maxi Skirts</h3>
        <p>ksh 1700</p>
        <button onclick="addToCart('Women Maxi Skirts', 1700)">Add to Cart</button>
    </div>

    <div class="item">
        <!-- Work pants — Unsplash free image -->
        <img src="https://images.unsplash.com/photo-1594938298603-c8148c4b4e7a?w=400&auto=format&fit=crop&q=80" alt="Fit Walk Wear Pants" loading="lazy">
        <h3>Fit Walk Wear Pants</h3>
        <p>ksh 999</p>
        <button onclick="addToCart('Fit Walk Wear Pants', 999)">Add to Cart</button>
    </div>

    <div class="item">
        <!-- Cargo pants — Unsplash free image -->
        <img src="https://images.unsplash.com/photo-1605518216938-7c31b7b14ad0?w=400&auto=format&fit=crop&q=80" alt="Cargo Pants" loading="lazy">
        <h3>Cargo Pants</h3>
        <p>ksh 1499</p>
        <button onclick="addToCart('Cargo Pants', 1499)">Add to Cart</button>
    </div>

    <div class="item">
        <!-- Dress — Unsplash free image -->
        <img src="https://images.unsplash.com/photo-1572804013427-4d7ca7268217?w=400&auto=format&fit=crop&q=80" alt="Dress" loading="lazy">
        <h3>Dress</h3>
        <p>ksh 1650</p>
        <button onclick="addToCart('Dress', 1650)">Add to Cart</button>
    </div>

    <div class="item">
        <!-- Casual pants — Unsplash free image -->
        <img src="https://images.unsplash.com/photo-1506629082955-511b1aa562c8?w=400&auto=format&fit=crop&q=80" alt="Casual Pants" loading="lazy">
        <h3>Casual Pants</h3>
        <p>ksh 1200</p>
        <button onclick="addToCart('Casual Pants', 1200)">Add to Cart</button>
    </div>

    <div class="item">
        <!-- Pants — Unsplash free image -->
        <img src="https://images.unsplash.com/photo-1473966968600-fa801b869a1a?w=400&auto=format&fit=crop&q=80" alt="Pants" loading="lazy">
        <h3>Pants</h3>
        <p>ksh 1150</p>
        <button onclick="addToCart('Pants', 1150)">Add to Cart</button>
    </div>

</div>

<div class="toast" id="toast"></div>

<footer>
    <p>© 2026 Outfit Store | Style Your Life</p>
</footer>

<script>
// ─── SESSION GUARD ────────────────────────────────────────────────────────────
(function() {
    if (!localStorage.getItem('loggedIn')) {
        window.location.href = 'index.html';
        return;
    }
    const name = localStorage.getItem('userName') || localStorage.getItem('userEmail') || '';
    document.getElementById('welcomeMsg').textContent = name ? `Hi, ${name}! 👋` : '';
})();

function logout() {
    if (!confirm('Logout?')) return;
    localStorage.removeItem('loggedIn');
    localStorage.removeItem('userEmail');
    localStorage.removeItem('userName');
    window.location.href = 'index.html';
}

// ─── CART ─────────────────────────────────────────────────────────────────────
function addToCart(name, price) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    cart.push({ name, price });
    localStorage.setItem('cart', JSON.stringify(cart));
    showToast(`✅ ${name} added! ksh ${price}`);
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 2800);
}
</script>
</body>
</html>
