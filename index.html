<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login - Outfit Store</title>
<!-- EmailJS SDK for sending real emails -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
    body {
        background-color: #0d0d0d;
        color: #fff;
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
    }
    .login-container {
        background-color: #1a1a1a;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 0 20px #0ff;
        width: 380px;
        max-width: 90%;
        text-align: center;
    }
    h2 { color: #0ff; margin-bottom: 20px; }
    h3 { color: #0ff; }
    input[type="email"], input[type="password"], input[type="text"] {
        width: 90%;
        padding: 12px;
        margin: 8px 0;
        border: 1px solid #0ff;
        border-radius: 4px;
        background-color: #222;
        color: #fff;
        font-size: 14px;
    }
    input:focus { outline: none; box-shadow: 0 0 8px #0ff; }
    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        background-color: #0ff;
        border: none;
        border-radius: 4px;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        font-size: 15px;
    }
    button:hover { background-color: #0cc; box-shadow: 0 0 10px #0ff; }
    .reset-link {
        display: block;
        margin-top: 10px;
        cursor: pointer;
        color: #f0f;
        font-size: 13px;
    }
    .reset-link:hover { text-decoration: underline; }
    #feedback {
        margin-top: 10px;
        font-size: 14px;
        min-height: 20px;
    }
    .err { color: #f55; }
    .ok  { color: #0f0; }
    #showRegister {
        margin-top: 15px;
        background-color: #f0f;
        color: #000;
    }
    #showRegister:hover { background-color: #d0d; box-shadow: 0 0 10px #f0f; }
    #registerForm, #verifyForm {
        display: none;
        margin-top: 20px;
        text-align: left;
    }
    .password-wrapper { position: relative; }
    .toggle-pw {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #0ff;
        font-size: 12px;
        background: none;
        border: none;
        width: auto;
        padding: 0;
        margin: 0;
    }
    .strength-bar {
        height: 4px;
        border-radius: 2px;
        margin: 4px 0 8px 0;
        transition: all 0.3s;
        background: #333;
    }
    .strength-weak   { background: #f55; width: 33%; }
    .strength-medium { background: #fa0; width: 66%; }
    .strength-strong { background: #0f0; width: 100%; }
    .strength-label  { font-size: 11px; color: #aaa; margin-bottom: 6px; }
    #googleBtn {
        background-color: #fff;
        color: #333;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 10px;
    }
    #googleBtn:hover { background-color: #eee; box-shadow: 0 0 8px #0ff; }
    .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 14px 0 4px;
        color: #555;
        font-size: 12px;
    }
    .divider::before, .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: #333;
    }
    .tabs { display: flex; gap: 0; margin-bottom: 20px; }
    .tab {
        flex: 1;
        padding: 10px;
        cursor: pointer;
        border: 1px solid #0ff;
        background: transparent;
        color: #0ff;
        font-weight: bold;
        transition: all 0.2s;
        margin: 0;
    }
    .tab:first-child { border-radius: 4px 0 0 4px; }
    .tab:last-child  { border-radius: 0 4px 4px 0; }
    .tab.active { background: #0ff; color: #000; }
    #loginPanel, #registerPanel, #verifyPanel { display: none; }
    #loginPanel.active, #registerPanel.active, #verifyPanel.active { display: block; }
    .code-inputs { display: flex; gap: 8px; justify-content: center; margin: 16px 0; }
    .code-inputs input {
        width: 44px;
        height: 52px;
        text-align: center;
        font-size: 22px;
        font-weight: bold;
        padding: 0;
        border: 2px solid #0ff;
        border-radius: 6px;
    }
    .resend-link {
        font-size: 12px;
        color: #f0f;
        cursor: pointer;
        display: inline-block;
        margin-top: 8px;
    }
    #lockoutMsg { color: #f55; font-size: 13px; margin-top: 8px; display: none; }
</style>
</head>
<body>

<div class="login-container">
    <h2>🛍️ Outfit Store</h2>

    <!-- Tab switch -->
    <div class="tabs" id="authTabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN PANEL -->
    <div id="loginPanel" class="active">
        <input type="email" id="loginEmail" placeholder="Email address" autocomplete="email" />
        <div class="password-wrapper">
            <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" />
            <button class="toggle-pw" onclick="togglePw('loginPassword', this)" tabindex="-1">Show</button>
        </div>
        <button onclick="handleLogin()">Login</button>
        <div id="lockoutMsg"></div>
        <span class="reset-link" onclick="handleForgotPassword()">Forgot Password?</span>
        <div class="divider">or</div>
        <button id="googleBtn" onclick="loginWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
            Login with Google
        </button>
        <div id="loginFeedback" class="err"></div>
    </div>

    <!-- REGISTER PANEL -->
    <div id="registerPanel">
        <input type="text"  id="regName"     placeholder="Full name" />
        <input type="email" id="regEmail"    placeholder="Email address" autocomplete="email" />
        <div class="password-wrapper">
            <input type="password" id="regPassword" placeholder="Password (min 8 chars)" oninput="checkStrength(this.value)" autocomplete="new-password" />
            <button class="toggle-pw" onclick="togglePw('regPassword', this)" tabindex="-1">Show</button>
        </div>
        <div class="strength-bar" id="strengthBar"></div>
        <div class="strength-label" id="strengthLabel"></div>
        <div class="password-wrapper">
            <input type="password" id="regPassword2" placeholder="Confirm password" autocomplete="new-password" />
            <button class="toggle-pw" onclick="togglePw('regPassword2', this)" tabindex="-1">Show</button>
        </div>
        <button onclick="handleRegister()">Create Account & Verify Email</button>
        <div id="registerFeedback" class="err"></div>
    </div>

    <!-- VERIFY EMAIL PANEL -->
    <div id="verifyPanel">
        <h3>📧 Verify Your Email</h3>
        <p style="font-size:13px;color:#aaa;" id="verifyMsg">Enter the 6-digit code we sent to your email.</p>
        <div class="code-inputs">
            <input type="text" maxlength="1" class="codeDigit" oninput="codeStep(this,0)" />
            <input type="text" maxlength="1" class="codeDigit" oninput="codeStep(this,1)" />
            <input type="text" maxlength="1" class="codeDigit" oninput="codeStep(this,2)" />
            <input type="text" maxlength="1" class="codeDigit" oninput="codeStep(this,3)" />
            <input type="text" maxlength="1" class="codeDigit" oninput="codeStep(this,4)" />
            <input type="text" maxlength="1" class="codeDigit" oninput="codeStep(this,5)" />
        </div>
        <button onclick="verifyCode()">Confirm Email</button>
        <span class="resend-link" onclick="resendCode()">Resend code</span>
        <div id="verifyFeedback" class="err" style="margin-top:8px;"></div>
    </div>
</div>

<script>
// ─── EMAILJS CONFIG ──────────────────────────────────────────────────────────
// SETUP INSTRUCTIONS (free, 200 emails/month):
// 1. Go to https://www.emailjs.com and create a free account
// 2. Add an Email Service (Gmail recommended) → copy your Service ID below
// 3. Create an Email Template with these variables: {{to_email}}, {{to_name}}, {{code}}
//    Template example: "Your verification code is: {{code}}"
// 4. Copy your Public Key from Account → API Keys
// Then replace the three placeholder values below:
const EMAILJS_PUBLIC_KEY  = 'YOUR_PUBLIC_KEY';   // ← paste here
const EMAILJS_SERVICE_ID  = 'YOUR_SERVICE_ID';   // ← paste here
const EMAILJS_TEMPLATE_ID = 'YOUR_TEMPLATE_ID';  // ← paste here

(function(){ emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY }); })();

// ─── SECURITY HELPERS ────────────────────────────────────────────────────────
// Simple hash using djb2 — NOT cryptographic, but prevents plain-text passwords in storage.
// For production, use a real backend with bcrypt.
function hashPassword(str) {
    let hash = 5381;
    for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) + hash) ^ str.charCodeAt(i);
    }
    return (hash >>> 0).toString(36) + '_' + btoa(str.split('').reverse().join('')).slice(0,12);
}

function sanitize(str) {
    return String(str).replace(/[<>"'`]/g, '').trim();
}

function validateEmail(e) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
}

function validatePassword(p) {
    return p.length >= 8 && /[A-Za-z]/.test(p) && /[0-9]/.test(p);
}

// ─── RATE LIMITING / BRUTE FORCE ─────────────────────────────────────────────
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS   = 15 * 60 * 1000; // 15 minutes

function getAttempts(email) {
    const data = JSON.parse(localStorage.getItem('loginAttempts') || '{}');
    return data[email] || { count: 0, time: 0 };
}
function recordAttempt(email) {
    const data = JSON.parse(localStorage.getItem('loginAttempts') || '{}');
    const rec  = data[email] || { count: 0, time: Date.now() };
    rec.count++;
    rec.time = Date.now();
    data[email] = rec;
    localStorage.setItem('loginAttempts', JSON.stringify(data));
}
function clearAttempts(email) {
    const data = JSON.parse(localStorage.getItem('loginAttempts') || '{}');
    delete data[email];
    localStorage.setItem('loginAttempts', JSON.stringify(data));
}
function isLockedOut(email) {
    const rec = getAttempts(email);
    if (rec.count >= MAX_ATTEMPTS) {
        if (Date.now() - rec.time < LOCKOUT_MS) return true;
        clearAttempts(email); // lockout expired
    }
    return false;
}

// ─── USERS DB (localStorage) ─────────────────────────────────────────────────
function getUsers()        { return JSON.parse(localStorage.getItem('outfitUsers') || '{}'); }
function saveUsers(users)  { localStorage.setItem('outfitUsers', JSON.stringify(users)); }

// ─── TAB SWITCHING ───────────────────────────────────────────────────────────
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0) === (tab==='login')));
    document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
    document.getElementById('registerPanel').classList.toggle('active', tab === 'register');
    document.getElementById('verifyPanel').classList.remove('active');
}

// ─── PASSWORD SHOW/HIDE ──────────────────────────────────────────────────────
function togglePw(id, btn) {
    const el = document.getElementById(id);
    const show = el.type === 'password';
    el.type = show ? 'text' : 'password';
    btn.textContent = show ? 'Hide' : 'Show';
}

// ─── PASSWORD STRENGTH ───────────────────────────────────────────────────────
function checkStrength(pw) {
    const bar = document.getElementById('strengthBar');
    const lbl = document.getElementById('strengthLabel');
    if (!pw) { bar.className = 'strength-bar'; lbl.textContent = ''; return; }
    const strong = pw.length >= 10 && /[A-Z]/.test(pw) && /[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw);
    const medium = pw.length >= 8  && /[A-Za-z]/.test(pw) && /[0-9]/.test(pw);
    if (strong)      { bar.className = 'strength-bar strength-strong'; lbl.textContent = 'Strong password ✅'; lbl.style.color='#0f0'; }
    else if (medium) { bar.className = 'strength-bar strength-medium'; lbl.textContent = 'Medium — add symbols/uppercase'; lbl.style.color='#fa0'; }
    else             { bar.className = 'strength-bar strength-weak';   lbl.textContent = 'Weak — too short or simple'; lbl.style.color='#f55'; }
}

// ─── VERIFICATION CODE STATE ─────────────────────────────────────────────────
let pendingVerification = null;

function generateCode() {
    return Math.floor(100000 + Math.random() * 900000).toString();
}

async function sendVerificationEmail(email, name, code) {
    return emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
        to_email: email,
        to_name:  name  || 'Customer',
        code:     code,
    });
}

// ─── REGISTER ────────────────────────────────────────────────────────────────
async function handleRegister() {
    const name  = sanitize(document.getElementById('regName').value);
    const email = sanitize(document.getElementById('regEmail').value).toLowerCase();
    const pw    = document.getElementById('regPassword').value;
    const pw2   = document.getElementById('regPassword2').value;
    const fb    = document.getElementById('registerFeedback');

    fb.className = 'err';
    if (!name)                        { fb.textContent = '❌ Please enter your name.';               return; }
    if (!validateEmail(email))        { fb.textContent = '❌ Invalid email address.';                return; }
    if (!validatePassword(pw))        { fb.textContent = '❌ Password: min 8 chars, include a number.'; return; }
    if (pw !== pw2)                   { fb.textContent = '❌ Passwords do not match.';               return; }

    const users = getUsers();
    if (users[email] && users[email].verified) { fb.textContent = '❌ Email already registered. Please login.'; return; }

    const code = generateCode();
    pendingVerification = { email, name, password: hashPassword(pw), code, expires: Date.now() + 10*60*1000 };

    fb.textContent = '📤 Sending verification code…';

    try {
        await sendVerificationEmail(email, name, code);
        fb.className = 'ok';
        fb.textContent = '✅ Code sent! Check your inbox (and spam folder).';
        document.getElementById('verifyMsg').textContent = `Enter the 6-digit code sent to ${email}`;
        document.getElementById('authTabs').style.display = 'none';
        document.getElementById('loginPanel').classList.remove('active');
        document.getElementById('registerPanel').classList.remove('active');
        document.getElementById('verifyPanel').classList.add('active');
        document.querySelectorAll('.codeDigit').forEach(i => i.value = '');
        document.querySelectorAll('.codeDigit')[0].focus();
    } catch(err) {
        fb.textContent = '❌ Failed to send email. Check EmailJS setup. (See console)';
        console.error('EmailJS error:', err);
        // DEV FALLBACK: show code in console so you can test without EmailJS
        console.warn('DEV — verification code:', code);
        fb.textContent += ' [Dev: code in console]';
    }
}

// ─── CODE INPUT NAVIGATION ───────────────────────────────────────────────────
function codeStep(el, idx) {
    el.value = el.value.replace(/[^0-9]/g,'');
    const digits = document.querySelectorAll('.codeDigit');
    if (el.value && idx < 5) digits[idx+1].focus();
    if (el.value && idx === 5) verifyCode();
}

// ─── VERIFY ──────────────────────────────────────────────────────────────────
function verifyCode() {
    const fb = document.getElementById('verifyFeedback');
    if (!pendingVerification) { fb.textContent = '❌ Session expired. Please register again.'; return; }
    if (Date.now() > pendingVerification.expires) { fb.textContent = '❌ Code expired. Please resend.'; return; }

    const entered = [...document.querySelectorAll('.codeDigit')].map(i=>i.value).join('');
    if (entered.length < 6) { fb.textContent = '❌ Enter all 6 digits.'; return; }
    if (entered !== pendingVerification.code) { fb.textContent = '❌ Incorrect code. Try again.'; return; }

    const users = getUsers();
    users[pendingVerification.email] = {
        name:     pendingVerification.name,
        email:    pendingVerification.email,
        password: pendingVerification.password,
        verified: true,
        createdAt: new Date().toISOString(),
    };
    saveUsers(users);

    sessionStart(pendingVerification.email, pendingVerification.name);
    pendingVerification = null;
}

async function resendCode() {
    if (!pendingVerification) return;
    const code = generateCode();
    pendingVerification.code    = code;
    pendingVerification.expires = Date.now() + 10*60*1000;
    document.getElementById('verifyFeedback').textContent = '📤 Resending…';
    try {
        await sendVerificationEmail(pendingVerification.email, pendingVerification.name, code);
        document.getElementById('verifyFeedback').className = 'ok';
        document.getElementById('verifyFeedback').textContent = '✅ New code sent!';
    } catch(e) {
        document.getElementById('verifyFeedback').textContent = '❌ Failed to resend.';
        console.warn('DEV — new code:', code);
    }
}

// ─── LOGIN ───────────────────────────────────────────────────────────────────
function handleLogin() {
    const email = sanitize(document.getElementById('loginEmail').value).toLowerCase();
    const pw    = document.getElementById('loginPassword').value;
    const fb    = document.getElementById('loginFeedback');
    const lock  = document.getElementById('lockoutMsg');

    fb.textContent = '';
    lock.style.display = 'none';

    if (!validateEmail(email)) { fb.textContent = '❌ Invalid email.'; return; }
    if (!pw)                   { fb.textContent = '❌ Enter your password.'; return; }

    if (isLockedOut(email)) {
        lock.style.display = 'block';
        lock.textContent = '🔒 Too many failed attempts. Try again in 15 minutes.';
        return;
    }

    const users = getUsers();
    const user  = users[email];

    if (!user)           { recordAttempt(email); fb.textContent = '❌ No account found. Please register.'; return; }
    if (!user.verified)  { fb.textContent = '❌ Email not verified. Please check your inbox.'; return; }
    if (user.password !== hashPassword(pw)) {
        recordAttempt(email);
        const left = MAX_ATTEMPTS - getAttempts(email).count;
        fb.textContent = `❌ Wrong password. ${left} attempt${left===1?'':'s'} left.`;
        return;
    }

    clearAttempts(email);
    sessionStart(email, user.name);
}

function sessionStart(email, name) {
    const token = btoa(email + ':' + Date.now()); // simple session token
    sessionStorage.setItem('sessionToken', token);
    sessionStorage.setItem('userEmail', email);
    sessionStorage.setItem('userName',  name);
    // Also store in localStorage for nav display
    localStorage.setItem('loggedIn',   'true');
    localStorage.setItem('userEmail',  email);
    localStorage.setItem('userName',   name);
    window.location.href = 'homepage.html';
}

function loginWithGoogle() {
    alert('Google login requires Firebase setup.\nFor now you can register with your email above.');
}

function handleForgotPassword() {
    const email = prompt('Enter your registered email:');
    if (!email || !validateEmail(email)) { alert('Please enter a valid email.'); return; }
    const users = getUsers();
    if (!users[email.toLowerCase().trim()]) { alert('No account with that email.'); return; }
    alert(`A password reset link has been sent to ${email}.\n(Connect EmailJS to enable this fully.)`);
}

// ─── AUTO-REDIRECT IF ALREADY LOGGED IN ──────────────────────────────────────
if (localStorage.getItem('loggedIn') === 'true') {
    window.location.href = 'homepage.html';
}
</script>
</body>
</html>
